<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Element</title>
</head>
<body>
    <!-- HTML Elements -->

    <!-- 
    The HTML elements is defined by a start tag, some content and an end tag.
    -->

    <h1>Ny first heading</h1>
    <p>my first paragraph</p>
    <!-- <br> it doesn't have ending tag -->
    <br> 

    <!-- Nested HTML element -->
    <div>
        <p>This paragraph is inside the div</p>
    </div>
</body>
</html>
